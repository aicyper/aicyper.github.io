<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>예제 3-2 meta 구조</title>

        <!--페이지 검색 키워드 지정-->
        <meta name="keyword" content="HTML CSS Web3D">
        <!--작성자 정보-->
        <meta name="author" content="류태희">
        <!--페이지 설명 ( 검색엔진 등에서 사용 )-->
        <meta name="description" content="HTML5 &amp; CSS3 &amp; JavaScript 강좌">
    </head>
    <body>
        <p>이 문서는 HTML 문서의 <code>&lt;meta&gt;</code>태그를 나타낸 것입니다.</p>

        <pre>
            name="keyword" content="HTML CSS Web3D"
            name="author" content="류태희"
            name="description" content="HTML5 &amp; CSS3 &amp; JavaScript 강좌"
        </pre>
    </body>
</html>
